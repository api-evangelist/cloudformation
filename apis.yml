name: AWS CloudFormation
description: >-
  A collection of APIs provided by AWS for infrastructure as code provisioning
  and management of AWS and third-party resources using CloudFormation templates
  and the Cloud Control API.
image: https://aws.amazon.com/cloudformation/logo.png
created: '2024'
modified: '2026-04-18'
url: https://docs.aws.amazon.com/cloudformation/
specificationVersion: '0.19'
tags:
  - Automation
  - AWS
  - Cloud Resources
  - IaC
  - Infrastructure As Code
  - Stack Management
apis:
  - name: AWS CloudFormation API
    description: >-
      AWS CloudFormation gives you an easy way to model a collection of related
      AWS and third-party resources, provision them quickly and consistently, and
      manage them throughout their lifecycles. It uses templates to define stacks
      of resources and provides API operations for creating, updating, and deleting
      stacks.
    image: https://aws.amazon.com/cloudformation/logo.png
    humanURL: https://aws.amazon.com/cloudformation/
    baseURL: https://cloudformation.{region}.amazonaws.com
    tags:
      - Infrastructure
      - Resources
      - Stacks
      - Templates
    properties:
      - type: Documentation
        url: https://docs.aws.amazon.com/cloudformation/
      - type: APIReference
        url: https://docs.aws.amazon.com/AWSCloudFormation/latest/APIReference/Welcome.html
      - type: OpenAPI
        url: openapi/cloudformation-api.yml
      - type: Pricing
        url: https://aws.amazon.com/cloudformation/pricing/
      - type: GettingStarted
        url: https://aws.amazon.com/cloudformation/getting-started/
      - type: ChangeLog
        url: https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/document-history.html
      - type: SDK
        url: https://boto3.amazonaws.com/v1/documentation/api/latest/reference/services/cloudformation.html
        title: Python SDK (Boto3)
    contact:
      - FN: AWS Support
        url: https://aws.amazon.com/contact-us/
        email: ''
  - name: AWS Cloud Control API
    description: >-
      AWS Cloud Control API provides a uniform CRUDL (create, read, update,
      delete, list) interface for managing AWS and third-party resources. It
      offers a standardized way to access and provision resource types available
      in the CloudFormation Registry without needing to learn each individual
      service API.
    image: https://aws.amazon.com/cloudformation/logo.png
    humanURL: https://aws.amazon.com/cloudcontrolapi/
    baseURL: https://cloudcontrolapi.{region}.amazonaws.com
    tags:
      - Cloud Control
      - CRUDL
      - Provisioning
      - Resources
    properties:
      - type: Documentation
        url: https://docs.aws.amazon.com/cloudcontrolapi/latest/userguide/what-is-cloudcontrolapi.html
      - type: OpenAPI
        url: openapi/cloud-control-api.yml
      - type: APIReference
        url: https://docs.aws.amazon.com/cloudcontrolapi/index.html
    contact:
      - FN: AWS Support
        url: https://aws.amazon.com/contact-us/
        email: ''
