naftiko: "1.0.0-alpha1"

info:
  label: "AWS Cloud Control API"
  description: "Uniform CRUDL interface for managing AWS and third-party resources through the CloudFormation Registry."
  tags:
    - AWS
    - Cloud Control
    - CRUDL
    - Resource Management
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY

capability:
  consumes:
    - type: http
      namespace: cloud-control
      baseUri: https://cloudcontrolapi.{region}.amazonaws.com
      description: "AWS Cloud Control API for uniform CRUDL resource management."
      authentication:
        type: apikey
        key: Authorization
        value: "{{AWS_ACCESS_KEY_ID}}"
        placement: header
      resources:
        - name: resources
          path: /
          description: "CRUDL operations for cloud resources."
          operations:
            - name: create-resource
              method: POST
              description: "Creates the specified resource."
              inputParameters:
                - name: Action
                  in: query
                  type: string
                  required: true
                  description: "API action (CreateResource)"
                - name: TypeName
                  in: query
                  type: string
                  required: true
                  description: "Resource type name (e.g., AWS::EC2::Instance)"
                - name: DesiredState
                  in: query
                  type: string
                  required: true
                  description: "JSON string of desired resource state"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-resource
              method: POST
              description: "Returns current state of the specified resource."
              inputParameters:
                - name: Action
                  in: query
                  type: string
                  required: true
                  description: "API action (GetResource)"
                - name: TypeName
                  in: query
                  type: string
                  required: true
                  description: "Resource type name"
                - name: Identifier
                  in: query
                  type: string
                  required: true
                  description: "Resource primary identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: update-resource
              method: POST
              description: "Updates the specified resource properties."
              inputParameters:
                - name: Action
                  in: query
                  type: string
                  required: true
                  description: "API action (UpdateResource)"
                - name: TypeName
                  in: query
                  type: string
                  required: true
                  description: "Resource type name"
                - name: Identifier
                  in: query
                  type: string
                  required: true
                  description: "Resource primary identifier"
                - name: PatchDocument
                  in: query
                  type: string
                  required: true
                  description: "JSON Patch document"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: delete-resource
              method: POST
              description: "Deletes the specified resource."
              inputParameters:
                - name: Action
                  in: query
                  type: string
                  required: true
                  description: "API action (DeleteResource)"
                - name: TypeName
                  in: query
                  type: string
                  required: true
                  description: "Resource type name"
                - name: Identifier
                  in: query
                  type: string
                  required: true
                  description: "Resource primary identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: list-resources
              method: POST
              description: "Returns information about specified resources."
              inputParameters:
                - name: Action
                  in: query
                  type: string
                  required: true
                  description: "API action (ListResources)"
                - name: TypeName
                  in: query
                  type: string
                  required: true
                  description: "Resource type name"
                - name: MaxResults
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-resource-request-status
              method: POST
              description: "Returns status of a resource operation request."
              inputParameters:
                - name: Action
                  in: query
                  type: string
                  required: true
                  description: "API action (GetResourceRequestStatus)"
                - name: RequestToken
                  in: query
                  type: string
                  required: true
                  description: "Request token"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: list-resource-requests
              method: POST
              description: "Returns existing resource operation requests."
              inputParameters:
                - name: Action
                  in: query
                  type: string
                  required: true
                  description: "API action (ListResourceRequests)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: cancel-resource-request
              method: POST
              description: "Cancels an in-progress resource operation request."
              inputParameters:
                - name: Action
                  in: query
                  type: string
                  required: true
                  description: "API action (CancelResourceRequest)"
                - name: RequestToken
                  in: query
                  type: string
                  required: true
                  description: "Request token"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: cloud-control-api
      resources:
        - path: /v1/resources
          name: resources
          description: "Cloud resources"
          operations:
            - method: POST
              name: create-resource
              description: "Create a cloud resource"
              call: "cloud-control.create-resource"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/resources/{typeName}/{identifier}
          name: resource
          description: "Single resource"
          operations:
            - method: GET
              name: get-resource
              description: "Get a resource"
              call: "cloud-control.get-resource"
              with:
                TypeName: "rest.typeName"
                Identifier: "rest.identifier"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-resource
              description: "Delete a resource"
              call: "cloud-control.delete-resource"
              with:
                TypeName: "rest.typeName"
                Identifier: "rest.identifier"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: cloud-control-mcp
      transport: http
      tools:
        - name: create-resource
          description: "Create a cloud resource"
          hints:
            readOnly: false
          call: "cloud-control.create-resource"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-resource
          description: "Read a cloud resource"
          hints:
            readOnly: true
            idempotent: true
          call: "cloud-control.get-resource"
          outputParameters:
            - type: object
              mapping: "$."

        - name: update-resource
          description: "Update a cloud resource"
          hints:
            readOnly: false
            idempotent: true
          call: "cloud-control.update-resource"
          outputParameters:
            - type: object
              mapping: "$."

        - name: delete-resource
          description: "Delete a cloud resource"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "cloud-control.delete-resource"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-resources
          description: "List resources of a specified type"
          hints:
            readOnly: true
            idempotent: true
          call: "cloud-control.list-resources"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-resource-request-status
          description: "Get status of a resource operation"
          hints:
            readOnly: true
            idempotent: true
          call: "cloud-control.get-resource-request-status"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-resource-requests
          description: "List resource operation requests"
          hints:
            readOnly: true
            idempotent: true
          call: "cloud-control.list-resource-requests"
          outputParameters:
            - type: object
              mapping: "$."

        - name: cancel-resource-request
          description: "Cancel an in-progress resource operation"
          hints:
            readOnly: false
          call: "cloud-control.cancel-resource-request"
          outputParameters:
            - type: object
              mapping: "$."
