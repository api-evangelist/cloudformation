              type: object
              required:
                - StackSetName
                - Regions
              properties:
                StackSetName:
                  type: string
                Accounts:
                  type: array
                  items:
                    type: string
                Regions:
                  type: array
                  items:
                    type: string
                ParameterOverrides:
                  type: array
                  items:
                    $ref: '#/components/schemas/Parameter'
                OperationPreferences:
                  $ref: '#/components/schemas/StackSetOperationPreferences'
                OperationId:
                  type: string
                  maxLength: 128
                CallAs:
                  type: string
                  enum:
                    - SELF
                    - DELEGATED_ADMIN
      responses:
        '200':
          description: Stack instances creation initiated.
          content:
            application/xml:
              schema:
                type: object
                properties:
                  CreateStackInstancesResult:
                    type: object
                    properties:
                      OperationId:
                        type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalError'

  /?Action=DescribeStackInstance:
    post:
      operationId: describeStackInstance
      summary: Describe a stack instance
      description: >-
        Returns the stack instance associated with the specified stack set,
        account, and region.
      tags:
        - Stack Instances
      parameters:
        - $ref: '#/components/parameters/VersionParam'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - StackSetName
                - StackInstanceAccount
                - StackInstanceRegion
              properties:
                StackSetName:
                  type: string
                StackInstanceAccount:
                  type: string
                StackInstanceRegion:
                  type: string
                CallAs:
                  type: string
                  enum:
                    - SELF
                    - DELEGATED_ADMIN
      responses:
        '200':
          description: Stack instance details returned.
          content:
            application/xml:
              schema:
                type: object
                properties:
                  DescribeStackInstanceResult:
                    type: object
                    properties:
                      StackInstance:
                        $ref: '#/components/schemas/StackInstance'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalError'

  /?Action=ListStackInstances:
    post:
      operationId: listStackInstances
      summary: List stack instances in a stack set
      description: >-
        Returns summary information about stack instances associated with the
        specified stack set.
      tags:
        - Stack Instances
      parameters:
        - $ref: '#/components/parameters/VersionParam'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - StackSetName
              properties:
                StackSetName:
                  type: string
                NextToken:
                  type: string
                  maxLength: 1024
                MaxResults:
                  type: integer
                  minimum: 1
                  maximum: 100
                StackInstanceAccount:
                  type: string
                StackInstanceRegion:
                  type: string
                CallAs:
                  type: string
                  enum:
                    - SELF
                    - DELEGATED_ADMIN
      responses:
        '200':
          description: Stack instance summaries returned.
          content:
            application/xml:
              schema:
                type: object
                properties:
                  ListStackInstancesResult:
                    type: object
                    properties:
                      Summaries:
                        type: array
                        items:
                          $ref: '#/components/schemas/StackInstanceSummary'
                      NextToken:
                        type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

  /?Action=DeleteStackInstances:
    post:
      operationId: deleteStackInstances
      summary: Delete stack instances from a stack set
      description: >-
        Deletes stack instances for the specified accounts in the specified regions.
      tags:
        - Stack Instances
      parameters:
        - $ref: '#/components/parameters/VersionParam'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - StackSetName
                - Regions
                - RetainStacks
              properties:
                StackSetName:
                  type: string
                Accounts:
                  type: array
                  items:
                    type: string
                Regions:
                  type: array
                  items:
                    type: string
                RetainStacks:
                  type: boolean
                  description: Whether to remove the stack instances from the stack set but not delete the stacks.
                OperationPreferences:
                  $ref: '#/components/schemas/StackSetOperationPreferences'
                OperationId:
                  type: string
                  maxLength: 128
                CallAs:
                  type: string
                  enum:
                    - SELF
                    - DELEGATED_ADMIN
      responses:
        '200':
          description: Stack instance deletion initiated.
          content:
            application/xml:
              schema:
                type: object
                properties:
                  DeleteStackInstancesResult:
                    type: object
                    properties:
                      OperationId:
                        type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalError'

  /?Action=ListTypes:
    post:
      operationId: listTypes
      summary: List available extension types in the registry
      description: >-
        Returns summary information about extension types registered in the
        CloudFormation Registry.
      tags:
        - Registry
      parameters:
        - $ref: '#/components/parameters/VersionParam'
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                Visibility:
                  type: string
                  enum:
                    - PUBLIC
                    - PRIVATE
                ProvisioningType:
                  type: string
                  enum:
                    - NON_PROVISIONABLE
                    - IMMUTABLE
                    - FULLY_MUTABLE
                Type:
                  type: string
                  enum:
                    - RESOURCE
                    - MODULE
                    - HOOK
                Filters:
                  type: object
                  properties:
                    Category:
                      type: string
                      enum:
                        - REGISTERED
                        - ACTIVATED
                        - THIRD_PARTY
                        - AWS_TYPES
                    PublisherId:
                      type: string
                    TypeNamePrefix:
                      type: string
                NextToken:
                  type: string
                  maxLength: 1024
                MaxResults:
                  type: integer
                  minimum: 1
                  maximum: 100
      responses:
        '200':
          description: Type summaries returned.
          content:
            application/xml:
              schema:
                type: object
                properties:
                  ListTypesResult:
                    type: object
                    properties:
                      TypeSummaries:
                        type: array
                        items:
                          $ref: '#/components/schemas/TypeSummary'
                      NextToken:
                        type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

  /?Action=DescribeType:
    post:
      operationId: describeType
      summary: Describe an extension type in the registry
      description: >-
        Returns detailed information about an extension type registered in the
        CloudFormation Registry.
      tags:
        - Registry
      parameters:
        - $ref: '#/components/parameters/VersionParam'
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                Type:
                  type: string
                  enum:
                    - RESOURCE
                    - MODULE
                    - HOOK
                TypeName:
                  type: string
                Arn:
                  type: string
                VersionId:
                  type: string
                PublisherId:
                  type: string
                PublicVersionNumber:
                  type: string
      responses:
        '200':
          description: Type details returned.
          content:
            application/xml:
              schema:
                type: object
                properties:
                  DescribeTypeResult:
                    type: object
                    properties:
                      Arn:
                        type: string
                      Type:
                        type: string
                      TypeName:
                        type: string
                      Description:
                        type: string
                      Schema:
                        type: string
                      ProvisioningType:
                        type: string
                      Visibility:
                        type: string
                      DefaultVersionId:
                        type: string
                      IsDefaultVersion:
                        type: boolean
                      TimeCreated:
                        type: string
                        format: date-time
                      LastUpdated:
                        type: string
                        format: date-time
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    AWS_Signature_V4:
      type: apiKey
      name: Authorization
      in: header
      description: AWS Signature Version 4 authentication.

  parameters:
    VersionParam:
      name: Version
      in: query
      required: true
      schema:
        type: string
        default: '2010-05-15'
      description: The API version. Fixed to 2010-05-15.

  responses:
    ValidationError:
      description: The input fails to satisfy the constraints specified by the service.
      content:
        application/xml:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: The specified resource was not found.
      content:
        application/xml:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    AlreadyExistsError:
      description: The resource already exists.
      content:
        application/xml:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: An internal service error occurred.
      content:
        application/xml:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      properties:
        Error:
          type: object
          properties:
            Type:
              type: string
            Code:
              type: string
            Message:
              type: string
        RequestId:
          type: string

    Stack:
      type: object
      required:
        - StackName
        - CreationTime
        - StackStatus
      properties:
        StackId:
          type: string
          description: Unique identifier of the stack.
        StackName:
          type: string
          description: The name associated with the stack.
        ChangeSetId:
          type: string
          description: The unique ID of the change set.
        Description:
          type: string
          description: A user-defined description associated with the stack.
        CreationTime:
          type: string
          format: date-time
          description: The time the stack was created.
        DeletionTime:
          type: string
          format: date-time
          description: The time the stack was deleted.
        LastUpdatedTime:
          type: string
          format: date-time
          description: The time the stack was last updated.
        StackStatus:
          $ref: '#/components/schemas/StackStatus'
        StackStatusReason:
          type: string
          description: Explanation for the current stack status.
        DisableRollback:
          type: boolean
          description: Whether rollback on stack creation failures is disabled.
        NotificationARNs:
          type: array
          description: Amazon SNS topic ARNs for stack event notifications.
          items:
            type: string
          maxItems: 5
        TimeoutInMinutes:
          type: integer
          description: Time allowed for stack creation before failure.
        Capabilities:
          type: array
          description: The capabilities allowed in the stack.
          items:
            type: string
            enum:
              - CAPABILITY_IAM
              - CAPABILITY_NAMED_IAM
              - CAPABILITY_AUTO_EXPAND
        Outputs:
          type: array
          description: A list of output structures.
          items:
            $ref: '#/components/schemas/Output'
        RoleARN:
          type: string
          description: The IAM role ARN used by CloudFormation.
          minLength: 20
          maxLength: 2048
        Tags:
          type: array
          description: Tags associated with the stack.
          items:
            $ref: '#/components/schemas/Tag'
          maxItems: 50
        EnableTerminationProtection:
          type: boolean
          description: Whether termination protection is enabled.
        Parameters:
          type: array
          description: A list of parameter structures.
          items:
            $ref: '#/components/schemas/Parameter'
        RollbackConfiguration:
          $ref: '#/components/schemas/RollbackConfiguration'
        ParentId:
          type: string
          description: For nested stacks, the stack ID of the direct parent.
        RootId:
          type: string
          description: For nested stacks, the stack ID of the top-level stack.
        DriftInformation:
          $ref: '#/components/schemas/StackDriftInformation'
        DeletionMode:
          type: string
          enum:
            - STANDARD
            - FORCE_DELETE_STACK
        DetailedStatus:
          type: string
          enum:
            - CONFIGURATION_COMPLETE
            - VALIDATION_FAILED
        RetainExceptOnCreate:
          type: boolean

    StackStatus:
      type: string
      enum:
        - CREATE_IN_PROGRESS
        - CREATE_FAILED
        - CREATE_COMPLETE
        - ROLLBACK_IN_PROGRESS
        - ROLLBACK_FAILED
        - ROLLBACK_COMPLETE
        - DELETE_IN_PROGRESS
        - DELETE_FAILED
        - DELETE_COMPLETE
        - UPDATE_IN_PROGRESS
        - UPDATE_COMPLETE_CLEANUP_IN_PROGRESS
        - UPDATE_COMPLETE
        - UPDATE_FAILED
        - UPDATE_ROLLBACK_IN_PROGRESS
        - UPDATE_ROLLBACK_FAILED
        - UPDATE_ROLLBACK_COMPLETE_CLEANUP_IN_PROGRESS
        - UPDATE_ROLLBACK_COMPLETE
        - REVIEW_IN_PROGRESS
        - IMPORT_IN_PROGRESS
        - IMPORT_COMPLETE
        - IMPORT_ROLLBACK_IN_PROGRESS
        - IMPORT_ROLLBACK_FAILED
        - IMPORT_ROLLBACK_COMPLETE

    StackSummary:
      type: object
      required:
        - StackName
        - CreationTime
        - StackStatus
      properties:
        StackId:
          type: string
        StackName:
          type: string
        TemplateDescription:
          type: string
        CreationTime:
          type: string
          format: date-time
        LastUpdatedTime:
          type: string
          format: date-time
        DeletionTime:
          type: string
          format: date-time
        StackStatus:
          $ref: '#/components/schemas/StackStatus'
        StackStatusReason:
          type: string
        ParentId:
          type: string
        RootId:
          type: string
        DriftInformation:
          $ref: '#/components/schemas/StackDriftInformation'

    StackResource:
      type: object
      required:
        - LogicalResourceId
        - ResourceType
        - ResourceStatus
        - Timestamp
      properties:
        StackName:
          type: string
          description: The name of the stack.
        StackId:
          type: string
          description: Unique identifier of the stack.
        LogicalResourceId:
          type: string
          description: The logical name of the resource specified in the template.
        PhysicalResourceId:
          type: string
          description: The name or unique identifier of the physical resource.
        ResourceType:
          type: string
          description: Type of AWS resource.
          minLength: 1
          maxLength: 256
        Timestamp:
          type: string
          format: date-time
          description: Time the status was updated.
        ResourceStatus:
          type: string
          description: Current status of the resource.
          enum:
            - CREATE_IN_PROGRESS
            - CREATE_FAILED
            - CREATE_COMPLETE
            - DELETE_IN_PROGRESS
            - DELETE_FAILED
            - DELETE_COMPLETE
            - UPDATE_IN_PROGRESS
            - UPDATE_FAILED
            - UPDATE_COMPLETE
            - IMPORT_FAILED
            - IMPORT_COMPLETE
            - IMPORT_IN_PROGRESS
            - IMPORT_ROLLBACK_IN_PROGRESS
            - IMPORT_ROLLBACK_FAILED
            - IMPORT_ROLLBACK_COMPLETE
            - ROLLBACK_IN_PROGRESS
            - ROLLBACK_COMPLETE
        ResourceStatusReason:
          type: string
          description: Message associated with the resource status.
        Description:
          type: string
          description: User-defined description.
          maxLength: 1024
        DriftInformation:
          $ref: '#/components/schemas/StackResourceDriftInformation'
        ModuleInfo:
          $ref: '#/components/schemas/ModuleInfo'

    StackResourceSummary:
      type: object
      required:
        - LogicalResourceId
        - ResourceType
        - ResourceStatus
        - LastUpdatedTimestamp
      properties:
        LogicalResourceId:
          type: string
        PhysicalResourceId:
          type: string
        ResourceType:
          type: string
        LastUpdatedTimestamp:
          type: string
          format: date-time
        ResourceStatus:
          type: string
        ResourceStatusReason:
          type: string
        DriftInformation:
          $ref: '#/components/schemas/StackResourceDriftInformation'
        ModuleInfo:
          $ref: '#/components/schemas/ModuleInfo'

    StackResourceDrift:
      type: object
      required:
        - StackId
        - LogicalResourceId
        - ResourceType
        - StackResourceDriftStatus
        - Timestamp
      properties:
        StackId:
          type: string
        LogicalResourceId:
          type: string
        PhysicalResourceId:
          type: string
        PhysicalResourceIdContext:
          type: array
          items:
            type: object
            properties:
              Key:
                type: string
              Value:
                type: string
        ResourceType:
          type: string
        ExpectedProperties:
          type: string
          description: A JSON string of the expected property values as defined in the template.
        ActualProperties:
          type: string
          description: A JSON string of the actual property values of the resource.
        PropertyDifferences:
          type: array
          items:
            $ref: '#/components/schemas/PropertyDifference'
        StackResourceDriftStatus:
          type: string
          enum:
            - IN_SYNC
            - MODIFIED
            - DELETED
            - NOT_CHECKED
        Timestamp:
          type: string
          format: date-time

    PropertyDifference:
      type: object
      required:
        - PropertyPath
        - ExpectedValue
        - ActualValue
        - DifferenceType
      properties:
        PropertyPath:
          type: string
        ExpectedValue:
          type: string
        ActualValue:
          type: string
        DifferenceType:
          type: string
          enum:
            - ADD
            - REMOVE
            - NOT_EQUAL

    StackDriftInformation:
      type: object
      required:
        - StackDriftStatus
      properties:
        StackDriftStatus:
          type: string
          enum:
            - DRIFTED
            - IN_SYNC
            - UNKNOWN
            - NOT_CHECKED
        LastCheckTimestamp:
          type: string
          format: date-time

    StackResourceDriftInformation:
      type: object
      required:
        - StackResourceDriftStatus
      properties:
        StackResourceDriftStatus:
          type: string
          enum:
            - IN_SYNC
            - MODIFIED
            - DELETED
            - NOT_CHECKED
        LastCheckTimestamp:
          type: string
          format: date-time

    StackEvent:
      type: object
      required:
        - StackId
        - EventId
        - StackName
        - Timestamp
      properties:
        StackId:
          type: string
        EventId:
          type: string
        StackName:
          type: string
        LogicalResourceId:
          type: string
        PhysicalResourceId:
          type: string
        ResourceType:
          type: string
        Timestamp:
          type: string
          format: date-time
        ResourceStatus:
          type: string
        ResourceStatusReason:
          type: string
        ResourceProperties:
          type: string
        ClientRequestToken:
          type: string
        HookType:
          type: string
        HookStatus:
          type: string
        HookStatusReason:
          type: string
        HookInvocationPoint:
          type: string
        HookFailureMode:
          type: string

    ChangeSetSummary:
      type: object
      properties:
        StackId:
          type: string
          description: The ID of the stack with which the change set is associated.
        StackName:
          type: string
        ChangeSetId:
          type: string
          description: The ARN of the change set.
        ChangeSetName:
          type: string
          maxLength: 128
        ExecutionStatus:
          type: string
          enum:
            - UNAVAILABLE
            - AVAILABLE
            - EXECUTE_IN_PROGRESS
            - EXECUTE_COMPLETE
            - EXECUTE_FAILED
            - OBSOLETE
        Status:
          type: string
          enum:
            - CREATE_PENDING
            - CREATE_IN_PROGRESS
            - CREATE_COMPLETE
            - DELETE_PENDING
            - DELETE_IN_PROGRESS
            - DELETE_COMPLETE
            - DELETE_FAILED
            - FAILED
        StatusReason:
          type: string
        CreationTime:
          type: string
          format: date-time
        Description:
          type: string
          maxLength: 1024
        IncludeNestedStacks:
          type: boolean
        ImportExistingResources:
          type: boolean
        ParentChangeSetId:
          type: string
        RootChangeSetId:
          type: string

    ChangeSetDetail:
      type: object
      properties:
        ChangeSetName:
          type: string
        ChangeSetId:
          type: string
        StackId:
          type: string
        StackName:
          type: string
        Description:
          type: string
        Parameters:
          type: array
          items:
            $ref: '#/components/schemas/Parameter'
        CreationTime:
          type: string
          format: date-time
        ExecutionStatus:
          type: string
        Status:
          type: string
        StatusReason:
          type: string
        NotificationARNs:
          type: array
          items:
            type: string
        RollbackConfiguration:
          $ref: '#/components/schemas/RollbackConfiguration'
        Capabilities:
          type: array
          items:
            type: string
        Tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
        Changes:
          type: array
          items:
            $ref: '#/components/schemas/Change'
        IncludeNestedStacks:
          type: boolean
        NextToken:
          type: string

    Change:
      type: object
      properties:
        Type:
          type: string
          enum:
            - Resource
        ResourceChange:
          $ref: '#/components/schemas/ResourceChange'

    ResourceChange:
      type: object
      properties:
        Action:
          type: string
          enum:
            - Add
            - Modify
            - Remove
            - Import
            - Dynamic
        LogicalResourceId:
          type: string
        PhysicalResourceId:
          type: string
        ResourceType:
          type: string
        Replacement:
          type: string
          enum:
            - 'True'
            - 'False'
            - Conditional
        Scope:
          type: array
          items:
            type: string
        Details:
          type: array
          items:
            $ref: '#/components/schemas/ResourceChangeDetail'

    ResourceChangeDetail:
      type: object
      properties:
        Target:
          type: object
          properties:
            Attribute:
              type: string
            Name:
              type: string
            RequiresRecreation:
              type: string
              enum:
                - Never
                - Conditionally
                - Always
        Evaluation:
          type: string
          enum:
            - Static
            - Dynamic
        ChangeSource:
          type: string
          enum:
            - ResourceReference
            - ParameterReference
            - ResourceAttribute
            - DirectModification
            - Automatic
        CausingEntity:
          type: string

    Parameter:
      type: object
      properties:
        ParameterKey:
          type: string
          description: The key associated with the parameter.
        ParameterValue:
          type: string
          description: The input value associated with the parameter.
        UsePreviousValue:
          type: boolean
          description: Use the existing parameter value during stack updates.
        ResolvedValue:
          type: string
          description: The value that resolves to for SSM parameter types.

    ParameterDeclaration:
      type: object
      properties:
        ParameterKey:
          type: string
        DefaultValue:
          type: string
        ParameterType:
          type: string
        NoEcho:
          type: boolean
        Description:
          type: string
        ParameterConstraints:
          type: object
          properties:
            AllowedValues:
              type: array
              items:
                type: string

    Output:
      type: object
      properties:
        OutputKey:
          type: string
          description: The key associated with the output.
        OutputValue:
          type: string
          description: The value associated with the output.
        Description:
          type: string
          description: User-defined description.
        ExportName:
          type: string
          description: The name of the export associated with the output.

    Tag:
      type: object
      required:
        - Key
        - Value
      properties:
        Key:
          type: string
          description: Tag key.
          minLength: 1
          maxLength: 128
        Value:
          type: string
          description: Tag value.
          minLength: 0
          maxLength: 256

    RollbackConfiguration:
      type: object
      properties:
        RollbackTriggers:
          type: array
          description: The triggers to monitor during stack creation or update.
          items:
            $ref: '#/components/schemas/RollbackTrigger'
          maxItems: 5
        MonitoringTimeInMinutes:
          type: integer
          description: The amount of time to monitor after stack deployment.
          minimum: 0
          maximum: 180

    RollbackTrigger:
      type: object
      required:
        - Arn
        - Type
      properties:
        Arn:
          type: string
          description: The Amazon Resource Name (ARN) of the rollback trigger.
        Type:
          type: string
          description: The resource type of the rollback trigger.

    Export:
      type: object
      properties:
        ExportingStackId:
          type: string
          description: The stack that contains the exported output value.
        Name:
          type: string
          description: The name of the exported output value.
        Value:
          type: string
          description: The value of the exported output.

    ModuleInfo:
      type: object
      properties:
        TypeHierarchy:
          type: string
          description: >-
            A concatenated list of the module type hierarchy. For modules within
            other modules the format is Module1::Module2.
        LogicalIdHierarchy:
          type: string
          description: >-
            A concatenated list of the logical IDs of the module.

    StackSet:
      type: object
      properties:
        StackSetName:
          type: string
        StackSetId:
          type: string
        Description:
          type: string
        Status:
          type: string
          enum:
            - ACTIVE
            - DELETED
        TemplateBody:
          type: string
        Parameters:
          type: array
          items:
            $ref: '#/components/schemas/Parameter'
        Capabilities:
          type: array
          items:
            type: string
        Tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
        StackSetARN:
          type: string
        AdministrationRoleARN:
          type: string
        ExecutionRoleName:
          type: string
        PermissionModel:
          type: string
          enum:
            - SERVICE_MANAGED
            - SELF_MANAGED

    StackSetSummary:
      type: object
      properties:
        StackSetName:
          type: string
        StackSetId:
          type: string
        Description:
          type: string
        Status:
          type: string
          enum:
            - ACTIVE
            - DELETED
        PermissionModel:
          type: string
          enum:
            - SERVICE_MANAGED
            - SELF_MANAGED
        DriftStatus:
          type: string
          enum:
            - DRIFTED
            - IN_SYNC
            - NOT_CHECKED
        LastDriftCheckTimestamp:
          type: string
          format: date-time

    StackSetOperationPreferences:
      type: object
      properties:
        RegionConcurrencyType:
          type: string
          enum:
            - SEQUENTIAL
            - PARALLEL
        RegionOrder:
          type: array
          items:
            type: string
        FailureToleranceCount:
          type: integer
          minimum: 0
        FailureTolerancePercentage:
