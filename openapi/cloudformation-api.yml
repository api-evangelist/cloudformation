            application/xml:
              schema:
                type: object
                properties:
                  GetStackPolicyResult:
                    type: object
                    properties:
                      StackPolicyBody:
                        type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

  /?Action=SetStackPolicy:
    post:
      operationId: setStackPolicy
      summary: Set a stack policy
      description: >-
