                        items:
                          $ref: '#/components/schemas/StackSetSummary'
                      NextToken:
                        type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

  /?Action=CreateStackInstances:
