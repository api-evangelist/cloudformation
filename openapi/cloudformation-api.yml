                      NextToken:
                        type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

  /?Action=ListImports:
    post:
      operationId: listImports
      summary: List stacks that import an exported value
      description: >-
