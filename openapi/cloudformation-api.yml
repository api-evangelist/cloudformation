  /?Action=CreateStackSet:
    post:
      operationId: createStackSet
      summary: Create a stack set
      description: >-
        Creates a stack set with the specified name and template. A stack set
        lets you create stacks in AWS accounts across regions by using a single
        CloudFormation template.
      tags:
        - Stack Sets
      parameters:
        - $ref: '#/components/parameters/VersionParam'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - StackSetName
              properties:
                StackSetName:
                  type: string
                  maxLength: 128
                Description:
                  type: string
                  maxLength: 1024
                TemplateBody:
                  type: string
                TemplateURL:
                  type: string
                  format: uri
                Parameters:
                  type: array
                  items:
                    $ref: '#/components/schemas/Parameter'
                Capabilities:
                  type: array
                  items:
                    type: string
                    enum:
                      - CAPABILITY_IAM
                      - CAPABILITY_NAMED_IAM
                      - CAPABILITY_AUTO_EXPAND
                Tags:
                  type: array
                  items:
                    $ref: '#/components/schemas/Tag'
                  maxItems: 50
                AdministrationRoleARN:
                  type: string
                  minLength: 20
                  maxLength: 2048
                ExecutionRoleName:
                  type: string
                  minLength: 1
                  maxLength: 64
                PermissionModel:
                  type: string
                  enum:
                    - SERVICE_MANAGED
                    - SELF_MANAGED
                CallAs:
                  type: string
                  enum:
                    - SELF
                    - DELEGATED_ADMIN
                ClientRequestToken:
                  type: string
                  maxLength: 128
      responses:
        '200':
          description: Stack set created.
          content:
            application/xml:
              schema:
                type: object
                properties:
                  CreateStackSetResult:
                    type: object
                    properties:
                      StackSetId:
                        type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/AlreadyExistsError'
        '500':
          $ref: '#/components/responses/InternalError'

  /?Action=DescribeStackSet:
    post:
      operationId: describeStackSet
      summary: Describe a stack set
      description: >-
        Returns the description of the specified stack set.
      tags:
        - Stack Sets
      parameters:
        - $ref: '#/components/parameters/VersionParam'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - StackSetName
              properties:
                StackSetName:
                  type: string
                CallAs:
                  type: string
                  enum:
                    - SELF
                    - DELEGATED_ADMIN
      responses:
        '200':
          description: Stack set details returned.
          content:
            application/xml:
              schema:
                type: object
                properties:
                  DescribeStackSetResult:
                    type: object
                    properties:
                      StackSet:
                        $ref: '#/components/schemas/StackSet'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalError'

  /?Action=UpdateStackSet:
    post:
      operationId: updateStackSet
      summary: Update a stack set
      description: >-
        Updates the stack set, and associated stack instances in the specified
        accounts and regions.
      tags:
        - Stack Sets
      parameters:
        - $ref: '#/components/parameters/VersionParam'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - StackSetName
              properties:
                StackSetName:
                  type: string
                Description:
                  type: string
                  maxLength: 1024
                TemplateBody:
                  type: string
                TemplateURL:
                  type: string
                  format: uri
                UsePreviousTemplate:
                  type: boolean
                Parameters:
                  type: array
                  items:
                    $ref: '#/components/schemas/Parameter'
                Capabilities:
                  type: array
                  items:
                    type: string
                Tags:
                  type: array
                  items:
                    $ref: '#/components/schemas/Tag'
                  maxItems: 50
                OperationPreferences:
                  $ref: '#/components/schemas/StackSetOperationPreferences'
                AdministrationRoleARN:
                  type: string
                  minLength: 20
                  maxLength: 2048
                ExecutionRoleName:
                  type: string
                PermissionModel:
                  type: string
                  enum:
                    - SERVICE_MANAGED
                    - SELF_MANAGED
                Accounts:
                  type: array
                  items:
                    type: string
                Regions:
                  type: array
                  items:
                    type: string
                CallAs:
                  type: string
                  enum:
                    - SELF
                    - DELEGATED_ADMIN
                OperationId:
                  type: string
                  maxLength: 128
      responses:
        '200':
          description: Stack set update initiated.
          content:
            application/xml:
              schema:
                type: object
                properties:
                  UpdateStackSetResult:
                    type: object
                    properties:
                      OperationId:
                        type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalError'

  /?Action=DeleteStackSet:
